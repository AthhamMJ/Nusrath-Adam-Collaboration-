<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        font-family: Arial;
        color: aliceblue;
    }
    body{
        background-image: url(R.jpeg);
        background-size: cover;
        height: 100%;
        margin: 0;
    }
    nav{
        display: flex;
        background: rgba(0,0,0,0.5);
        border-bottom: 2px solid rgba(255, 255, 255, 0.5);
        border-bottom-left-radius: 28px;
        border-bottom-right-radius: 28px;
        justify-content: space-between;
        align-items: center;
    }
    a{
        color: aliceblue;
        margin: 20px;
        text-decoration: none;
    }
    .button{
        background-color: rgb(31, 145, 0);
        color: aliceblue;
        height: 30px;
        width: 120px;
        border-radius: 12px;
        border: none;
        margin-right: 10px;
    }
    a.pill{
        display: inline-flex;
        justify-content: center;
        align-items: center;

        background-color: rgb(31, 145, 0);
        color: aliceblue;
        width: 120px;
        height: 30px;
        border-radius: 12px;
        text-decoration: none;
        margin-right: 10px;
    }
    h4{
        color: aliceblue;
        margin-left: 10px;
        font-size: 20px;
    }
    h1, h2{
        font-size: 70px;
        position: relative;
        top: 140px;
        left: 20px;
    }
    h2{
        font-size: 38px;
    }
    .contend{
        display: flex;
        flex-direction: column;
        align-items: center;
        position: absolute;
    }
    .button-fund{
        height: fit-content;
        width: fit-content;
        padding: 20px;
        color: aliceblue;
        font-size: large;

        background-color: rgba(0, 183, 255, 0.25);
        border-radius: 28px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        translate: transform 1s ease;
    }
    .button-fund:hover, .button:hover{
        transform: translateY(-2px);
    }
</style>
<body>
    <nav>
        <div><h4>Open-Fund</h4></div>
        <div>
        <a>home</a>
        <a>service</a>
        <a class="pill">contact us</a>
        <a>explore</a>
        </div>
        <button class="button">SignUp</button>
    </nav>
    <div>
        <h1>Explore around <br>the World...</h1>
    </div>
    <div>
        <h2 style="color: red;">Justice For Ashthaaf</h2>
        <h2>by Nobody_MJ</h2>
        <center><button class="button-fund">Contribute Your Fund</button></center>
    </div>
</body>
</html>
