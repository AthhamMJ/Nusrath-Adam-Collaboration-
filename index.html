<!DOCTYPE html>
<html lang="en">
<head>
    <title>Nusrath_MR & Athham_MJ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        *{
            margin: 0;
            padding: 0;
            color: white;
            font-family: poppins;
        }
        body{
            margin: 0;
            min-height:100vh;
            background-image:url(bg-pic.jpg);
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;
        }
        .nav{
            display: flex;
            position: sticky;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            padding:10px 20px;

            height: auto;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            height: 100px;
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;

            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow:
                inset 0 -2px 1px rgba(255, 255, 255, 0.2);
            
        }
        .link{
            display: flex;
            gap: 15px;
        }
        b{  
            display: flex;
            justify-content: center;
            height: max-content;
            width: max-content;
            padding: 5px;
            border-radius: 20px;
            border-left: none;
            border-right: 3px solid rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            border-top: none;
        }
        a{
            color: white;
            text-decoration: none;
            padding: 0px 20px;
            font-size: 16px;
            transition: color .25s ease;

        }
        a:hover{
            color: red;
        }

        .joinus{
            background: transparent;
            height: fit-content;
            width: 100px;
            border: 1px solid white;

            font-weight: bold;

            padding: 10px;
            text-align: center;
            border-radius: 28px;

            transition: transform 0.3s ease,
                        background-color 0.3s ease;
        }
        .joinus:hover{
            transform: translateY(-2px) scale(1.05);
            background-color: rgb(255, 255, 255);
            color: red;
        }

        .fieldset-contend{
            display: flex;
            justify-content: left;
            padding: 20px;    
        }
        fieldset{
            border-top-right-radius: 100px;
            border-bottom-right-radius: 100px; 
            min-height: 500px;
            width: 90%;
            max-width: 400px;
            margin-top: 70px;
            padding: 30px;
            border-left: none;
            border-right: 4px solid rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
        }
        .text-contend{
            text-align: left;
            color: white;
        }
        .head-contend{
            color: greenyellow;
        }
        h1{
            font-size: clamp(32px, 6vw, 60px);
            line-height: 1.2;
        }
        li{
            font-size: clamp(18px, 4vw, 28px);
            line-height: 1.8;
        }
        .footer{
            text-align: center;
            padding: 20px 0;
            background: #111; /* Change if needed */
            color: white;
            font-size: 14px;
        }
        @media (max-width: 300px){

            .nav{
                flex-direction: column;
                text-align: center;
            }

            .nav div{
                flex-direction: column;
                gap: 10px;
            }

            .fieldset-contend{
                justify-content: center;
                padding: 20px;
            }

            fieldset{
                width: 90%;
                max-width: none;
                border-radius: 30px;
                padding: 25px;
                margin-top: 30px;
            }

            h1{
                font-size: 38px;
            }

            li{
                font-size: 20px;
            }

            .joinus{
                width: 140px;
            }
        }


    </style>
</head>
<body>

    <div class="nav">
        <b>Nusrath MR <br> Athham MJ</b>
        
        <div>
            <a href="#about">About us</a>
            <a href="#Vission">Vission</a>
            <a href="#Roadmap">Roadmap</a>
        </div>
    
        <a href="#contact">
            <button class="joinus">Join Us</button>
        </a>
    </div>

    <div class="fieldset-contend">
        <fieldset>
            <div>
                <h1 class="head-contend">Our Goals</h1><br><br>
                <ul>
                    <li>Creating MVP websites</li>
                    <li>Creating Portfolios (Company & Personal)</li>
                    <li>Creating the Commercial websites</li>
                    <li>Start-ups</li>
                    <li>Creating Freelancing community</li>
                </ul>
            </div>
        </fieldset>
    </div>
    
    <footer class="footer">
        <p>&copy; <span id="year"></span> Nusrath MR &amp; Athham MJ. All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
